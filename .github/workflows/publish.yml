name: publish

# Triggered by pushing a v* tag (e.g. v0.1.0), or manually via the Actions
# UI / GitHub API by dispatching with a ref.
#
# Auth: npm Trusted Publishing (OIDC) once configured at npmjs.com. Until
# then, the first publish needs an NPM_TOKEN repo secret. After the package
# exists, configure Trusted Publishing at:
#   https://www.npmjs.com/package/kxco-post-quantum-webhook/access
# Binding to: org=JackKXCO, repo=kxco-post-quantum-webhook, workflow=publish.yml
# Then delete the NPM_TOKEN secret.
#
# All third-party actions pinned by 40-char commit SHA.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to publish (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # required for npm provenance (and Trusted Publishing)

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node 20 with npm registry
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish (provenance via OIDC; uses Trusted Publishing once configured)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
